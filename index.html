<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --ink:     #1a1a2e;
  --ink2:    #252540;
  --surface: #f4f1ec;
  --paper:   #faf8f4;
  --edge:    #e2ddd6;
  --accent:  #3d5a99;
  --accent2: #6b8cce;
  --muted:   #8a8a9a;
  --muted2:  #b0aaaa;
  --green:   #4a9e78;
  --red:     #c45a5a;
  --r:       14px;
  --rs:      9px;
}

body {
  font-family: 'Geist Mono', monospace;
  background: var(--surface);
  color: var(--ink);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ── HEADER ──────────────────────────── */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 12px;
  background: var(--paper);
  border-bottom: 1px solid var(--edge);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-logo {
  font-family: 'Geist Mono', monospace;
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.data-btn {
  background: var(--paper);
  border: 1px solid var(--edge);
  border-radius: 50%;
  width: 34px;
  height: 34px;
  font-size: 16px;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: background 0.15s, color 0.15s;
}
.data-btn:active { background: var(--edge); color: var(--ink); }

/* ── TAB BAR ─────────────────────────── */
.tab-bar {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--edge);
  position: sticky;
  top: 61px;
  z-index: 99;
}

.tab-btn {
  flex: 1;
  background: none;
  border: none;
  color: var(--muted);
  padding: 11px 8px;
  font-size: 11px;
  font-weight: 600;
  font-family: 'Geist Mono', monospace;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}

.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── CONTENT ─────────────────────────── */
.tab-content { display: none; flex: 1; overflow-y: auto; position: relative; z-index: 1; }
.tab-content.active { display: block; }

/* ── WEEK NAV ────────────────────────── */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--paper);
  border-bottom: 1px solid var(--edge);
}

.week-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

.nav-btn {
  background: none;
  border: 1px solid var(--edge);
  border-radius: 7px;
  color: var(--muted);
  width: 30px; height: 30px;
  font-size: 17px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn:active { background: var(--edge); }

/* ── DAYS STRIP ──────────────────────── */
.days-strip {
  display: flex;
  gap: 5px;
  padding: 10px 14px;
  background: var(--paper);
  border-bottom: 1px solid var(--edge);
}

.day-chip {
  flex: 1;
  background: none;
  border: 1px solid var(--edge);
  border-radius: var(--rs);
  padding: 8px 2px;
  color: var(--muted);
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: all 0.15s;
  position: relative;
}

.day-chip .dn { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; }
.day-chip .dd { font-size: 15px; font-weight: 600; }
.day-chip.active { background: var(--ink); border-color: var(--ink); color: var(--surface); }
.day-chip.has-data::after {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--green);
  position: absolute;
  bottom: 4px;
}
.day-chip.active.has-data::after { background: var(--accent2); }

/* ── DIARY FORM ──────────────────────── */
.diary-form { padding: 14px 16px 80px; }

.date-heading {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ── ACTIVITY ROWS ───────────────────── */
.activity-card {
  background: var(--paper);
  border: 1px solid var(--edge);
  border-radius: var(--r);
  padding: 11px 18px;
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.act-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.02em;
  flex: 1;
}

.act-input { display: flex; align-items: center; gap: 8px; }

.act-unit {
  font-size: 11px;
  color: var(--muted2);
  letter-spacing: 0.06em;
  width: 36px;
}

/* Value tap button */
.val-tap {
  background: var(--surface);
  border: 1px solid var(--edge);
  border-radius: var(--rs);
  padding: 7px 14px;
  font-family: 'Geist Mono', monospace;
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  min-width: 86px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s;
  letter-spacing: 0.02em;
  user-select: none;
  line-height: 1;
}
.val-tap.empty { color: var(--muted2); font-weight: 400; }
.val-tap:active { border-color: var(--accent); }

/* Counter (styrke) */
.counter-row { display: flex; align-items: center; gap: 8px; }

.counter-val {
  background: var(--surface);
  border: 1px solid var(--edge);
  border-radius: var(--rs);
  padding: 7px 0;
  font-size: 15px;
  font-weight: 600;
  width: 56px;
  text-align: center;
  line-height: 1;
}

.cnt-btn {
  background: var(--paper);
  border: 1px solid var(--edge);
  border-radius: var(--rs);
  width: 30px; height: 30px;
  font-size: 18px;
  font-weight: 400;
  color: var(--ink);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}
.cnt-btn:active { background: var(--edge); }

/* Clear bar */
.clear-bar { display: flex; gap: 8px; margin-top: 20px; }

.btn-clear {
  background: none;
  border: 1px solid var(--edge);
  border-radius: var(--rs);
  padding: 14px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  flex: 1;
}
.btn-clear:active { border-color: var(--red); color: var(--red); }

.status-msg {
  margin-top: 10px;
  font-size: 11px;
  text-align: center;
  min-height: 16px;
  color: var(--green);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.status-msg.err { color: var(--red); }

/* ── OVERVIEW ─────────────────────────── */
.overview-wrap { padding: 10px 12px 60px; }

.period-tabs { display: flex; gap: 6px; margin-bottom: 8px; }

.period-tab {
  flex: 1;
  background: var(--paper);
  border: 1px solid var(--edge);
  border-radius: var(--rs);
  padding: 7px 8px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  letter-spacing: 0.08em;
  text-align: center;
  text-transform: uppercase;
  transition: all 0.15s;
}
.period-tab.active { background: var(--ink); border-color: var(--ink); color: var(--surface); }

.period-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.period-nav-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}

.stat-card {
  background: var(--paper);
  border: 1px solid var(--edge);
  border-radius: var(--r);
  padding: 10px 12px;
  text-align: center;
}

.stat-card-label {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 4px;
}

.stat-card-val { font-size: 24px; font-weight: 600; color: var(--ink); line-height: 1; }
.stat-card-sub { font-size: 10px; color: var(--muted2); margin-top: 3px; letter-spacing: 0.04em; }

.chart-card {
  background: var(--paper);
  border: 1px solid var(--edge);
  border-radius: var(--r);
  padding: 10px 12px;
  margin-bottom: 8px;
}

.chart-title {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 8px;
}

.chart-wrap { position: relative; height: 100px; }

.legend { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px 6px; margin-top: 8px; }
.leg {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.03em;
  cursor: pointer;
  padding: 3px 6px;
  border-radius: 5px;
  border: 1px solid transparent;
  transition: all 0.15s;
  user-select: none;
}
.leg:hover { color: var(--ink); border-color: var(--edge); }
.leg.filter-on {
  color: var(--ink);
  border-color: var(--ink);
  background: var(--surface);
  font-weight: 600;
}
.leg-dot { width: 8px; height: 8px; border-radius: 3px; flex-shrink: 0; }

.breakdown-section-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted2);
  margin: 2px 0 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--edge);
}

/* ── 3-column breakdown grid ─── */
.breakdown-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

.breakdown-card {
  background: var(--paper);
  border: 1px solid var(--edge);
  border-radius: var(--r);
  padding: 9px 12px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
}
.breakdown-card:hover { border-color: var(--muted2); }
.breakdown-card.filter-on {
  background: var(--ink);
  border-color: var(--ink);
}
.breakdown-card.filter-on .breakdown-name { color: var(--accent2); }
.breakdown-card.filter-on .breakdown-val { color: var(--surface); }
.breakdown-card.filter-on .breakdown-unit { color: var(--muted2); }

.breakdown-name {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 3px;
  transition: color 0.15s;
}
.breakdown-val {
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
  transition: color 0.15s;
}
.breakdown-unit { font-size: 9px; color: var(--muted2); font-weight: 400; transition: color 0.15s; }

.filter-hint {
  text-align: center;
  font-size: 9px;
  color: var(--accent);
  letter-spacing: 0.08em;
  margin-top: 6px;
  min-height: 14px;
  text-transform: uppercase;
}

.empty-msg { text-align: center; padding: 60px 20px; color: var(--muted2); font-size: 13px; line-height: 1.8; }

/* ── CALENDAR ─────────────────────────── */
.cal-card {
  background: var(--paper);
  border: 1px solid var(--edge);
  border-radius: var(--r);
  padding: 12px;
  margin-bottom: 8px;
}

.cal-title {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 10px;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}

.cal-dh {
  font-size: 9px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted2);
  text-align: center;
  padding: 2px 0 6px;
}

.cal-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3px 0 2px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.1s;
  min-height: 36px;
}
.cal-cell:active { background: var(--edge); }
.cal-cell.empty { pointer-events: none; }

.cal-num-wrap {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 2px;
}
.cal-num {
  font-size: 11px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
}
.cal-cell.is-today .cal-num-wrap { background: var(--ink); }
.cal-cell.is-today .cal-num { color: var(--surface); }

.cal-dots {
  display: flex;
  gap: 2px;
  flex-wrap: wrap;
  justify-content: center;
  min-height: 5px;
}
.cal-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── PICKER ──────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,26,46,0.4);
  backdrop-filter: blur(3px);
  z-index: 500;
  display: none;
  align-items: flex-end;
}
.overlay.open { display: flex; }

.picker-sheet {
  width: 100%;
  background: var(--paper);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--edge);
  padding-bottom: env(safe-area-inset-bottom, 20px);
  animation: slideUp 0.22s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.picker-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--edge);
}

.picker-lbl { font-size: 14px; font-weight: 600; color: var(--ink); letter-spacing: 0.04em; }

.picker-cancel, .picker-done {
  background: none;
  border: none;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  letter-spacing: 0.05em;
}
.picker-cancel { color: var(--muted); }
.picker-done   { color: var(--accent); }

.picker-wheels {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 0;
  padding: 10px 20px 20px;
  position: relative;
}

.picker-wheels::before {
  content: '';
  position: absolute;
  left: 20px; right: 20px;
  top: 50%; transform: translateY(-50%);
  height: 46px;
  border-top: 1px solid var(--edge);
  border-bottom: 1px solid var(--edge);
  pointer-events: none;
}

.wheel-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.wheel-col-unit {
  height: 26px;
  display: flex;
  align-items: flex-end;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted2);
  padding-bottom: 4px;
}

.wheel-sep {
  font-size: 26px;
  font-weight: 600;
  color: var(--ink2);
  user-select: none;
  padding: 0 4px;
  align-self: center;
  margin-top: 26px;
}

.wheel {
  height: 230px;
  width: 90px;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.wheel.narrow { width: 64px; }
.wheel::-webkit-scrollbar { display: none; }

/* No fixed spacers anymore — we use JS padding items */
.wheel-spacer { height: 92px; }

.wheel-item {
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: 600;
  color: var(--muted2);
  scroll-snap-align: center;
  font-variant-numeric: tabular-nums;
  cursor: pointer;
}

/* ── TOAST ──────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--ink);
  color: var(--surface);
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  z-index: 900;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-logo">Trening</div>
  <div class="header-actions">
    <button class="data-btn" onclick="exportData()" title="Lag backup">↑</button>
    <button class="data-btn" onclick="document.getElementById('import-input').click()" title="Importer backup">↓</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('reg')">Registrering</button>
  <button class="tab-btn" onclick="switchTab('oversikt')">Oversikt</button>
</div>

<!-- ── REGISTRERING ─────────────────────────────────────────── -->
<div id="tab-reg" class="tab-content active">
  <div class="week-nav">
    <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
    <span class="week-label" id="week-label">Uke —</span>
    <button class="nav-btn" onclick="changeWeek(1)">›</button>
  </div>

  <div class="days-strip" id="days-strip"></div>

  <div class="diary-form">
    <div class="date-heading" id="date-heading">—</div>

    <div class="activity-card">
      <span class="act-name">Løping</span>
      <div class="act-input">
        <button class="val-tap empty" id="tap-skog" onclick="openPicker('skog')">—</button>
        <span class="act-unit">km</span>
      </div>
    </div>

    <div class="activity-card">
      <span class="act-name">Sykling</span>
      <div class="act-input">
        <button class="val-tap empty" id="tap-vei" onclick="openPicker('vei')">—</button>
        <span class="act-unit">km</span>
      </div>
    </div>

    <div class="activity-card">
      <span class="act-name">Fotball</span>
      <div class="act-input">
        <button class="val-tap empty" id="tap-fotball" onclick="openPicker('fotball')">—</button>
        <span class="act-unit">t:min</span>
      </div>
    </div>

    <div class="activity-card">
      <span class="act-name">Svømming</span>
      <div class="act-input">
        <button class="val-tap empty" id="tap-svom" onclick="openPicker('svom')">—</button>
        <span class="act-unit">m</span>
      </div>
    </div>

    <div class="activity-card">
      <span class="act-name">Langrenn</span>
      <div class="act-input">
        <button class="val-tap empty" id="tap-langrenn" onclick="openPicker('langrenn')">—</button>
        <span class="act-unit">km</span>
      </div>
    </div>

    <div class="activity-card">
      <span class="act-name">Styrke</span>
      <div class="act-input">
        <div class="counter-row">
          <button class="cnt-btn" onclick="changeStyrke(-1)">−</button>
          <div class="counter-val" id="val-styrke">0</div>
          <button class="cnt-btn" onclick="changeStyrke(1)">+</button>
        </div>
      </div>
    </div>

    <div class="clear-bar">
      <button class="btn-clear" onclick="clearDay()">Tøm dag</button>
    </div>
    <div class="status-msg" id="status-msg"></div>
  </div>
</div>

<!-- ── OVERSIKT ──────────────────────────────────────────────── -->
<div id="tab-oversikt" class="tab-content">
  <div class="overview-wrap">
    <div class="period-tabs">
      <button class="period-tab active" onclick="setPeriod('uke')">Uke</button>
      <button class="period-tab" onclick="setPeriod('maned')">Måned</button>
      <button class="period-tab" onclick="setPeriod('ar')">År</button>
    </div>
    <div class="period-nav">
      <button class="nav-btn" onclick="changePeriod(-1)">‹</button>
      <span class="period-nav-label" id="period-label">—</span>
      <button class="nav-btn" onclick="changePeriod(1)">›</button>
    </div>
    <div id="overview-body"></div>
  </div>
</div>

<!-- ── PICKER OVERLAY ────────────────────────────────────────── -->
<div class="overlay" id="picker-overlay" onclick="overlayBgClick(event)">
  <div class="picker-sheet">
    <div class="picker-header">
      <button class="picker-cancel" onclick="closePicker(false)">Avbryt</button>
      <span class="picker-lbl" id="picker-lbl">—</span>
      <button class="picker-done" onclick="closePicker(true)">Ferdig</button>
    </div>
    <div class="picker-wheels">
      <div class="wheel-col">
        <div class="wheel-col-unit" id="unit-left"></div>
        <div class="wheel" id="wheel-left"></div>
      </div>
      <div class="wheel-sep" id="wheel-sep"></div>
      <div class="wheel-col" id="right-col" style="display:none">
        <div class="wheel-col-unit" id="unit-right"></div>
        <div class="wheel narrow" id="wheel-right"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONSTANTS ─────────────────────────────────────────────────
const DAYS_NO   = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const DAYS_LONG = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag','Søndag'];
const MONTHS_NO = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
const MONTHS_SH = ['Jan','Feb','Mar','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Des'];

const ACT_COLORS = {
  skog:'#4a9e78', vei:'#3d7cb5', fotball:'#c49a3d', svom:'#e07840', styrke:'#9e5a7a', langrenn:'#7a5a9e'
};
const ACT_NAMES = {
  skog:'Løping', vei:'Sykling', fotball:'Fotball', svom:'Svømming', styrke:'Styrke', langrenn:'Langrenn'
};
const ACT_UNITS = { skog:'km', vei:'km', fotball:'min', svom:'m', styrke:'enheter', langrenn:'km' };

// Styrke only shows dots/bars in overview if >= 100 enheter per day
const STYRKE_OVERVIEW_THRESHOLD = 100;

// ─── STORAGE ───────────────────────────────────────────────────
function loadAll() { try { return JSON.parse(localStorage.getItem('treningslogg_v2') || '{}'); } catch { return {}; } }
function persistAll(d) { localStorage.setItem('treningslogg_v2', JSON.stringify(d)); }
function getEntry(ds)  { return loadAll()[ds] || null; }
function setEntry(ds, e) { const a = loadAll(); a[ds] = e; persistAll(a); }

// ─── DATE UTILS ────────────────────────────────────────────────
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }

function mondayOf(d) {
  const c = new Date(d); c.setHours(0,0,0,0);
  const wd = c.getDay();
  c.setDate(c.getDate() - (wd === 0 ? 6 : wd - 1));
  return c;
}

function isoWeek(d) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dow = t.getUTCDay() || 7;
  t.setUTCDate(t.getUTCDate() + 4 - dow);
  const y1 = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
  return [t.getUTCFullYear(), Math.ceil(((t - y1) / 86400000 + 1) / 7)];
}

// ─── PICKER CONFIG ─────────────────────────────────────────────

const PICKER_CONFIG = {
  skog: {
    type: 'km', label: 'Løping',
    leftUnit: 'km', sep: '.', rightUnit: 'des'
  },
  vei: {
    type: 'km', label: 'Sykling',
    leftUnit: 'km', sep: '.', rightUnit: 'des'
  },
  fotball: {
    type: 'hhmm', label: 'Fotball',
    leftUnit: 'timer', sep: ':', rightUnit: 'min'
  },
  svom: {
    type: 'single', label: 'Svømming',
    leftUnit: 'm',
    vals: Array.from({length:51}, (_,i) => ({val:i*100, label:String(i*100)}))
  },

// ─── PICKER ────────────────────────────────────────────────────
function openPicker(field) {
  pField = field;
  const cfg = PICKER_CONFIG[field];
  document.getElementById('picker-lbl').textContent = cfg.label;

  const sep      = document.getElementById('wheel-sep');
  const rightCol = document.getElementById('right-col');
  const unitL    = document.getElementById('unit-left');
  const unitR    = document.getElementById('unit-right');

  if (cfg.type === 'km') {
    const val   = form[field] || PICKER_DEFAULTS[field];
    const whole = Math.floor(val);
    const dec   = Math.round((val - whole) * 10);

    unitL.textContent = cfg.leftUnit;
    buildWheel('wheel-left',
      Array.from({length:31}, (_,i) => ({val:i, label:String(i)})),
      whole);

    sep.textContent = cfg.sep;
    rightCol.style.display = '';
    unitR.textContent = cfg.rightUnit;
    buildWheel('wheel-right',
      Array.from({length:10}, (_,i) => ({val:i, label:String(i)})),
      dec < 10 ? dec : 0);

  } else if (cfg.type === 'hhmm') {
    const val    = form[field] || PICKER_DEFAULTS[field];
    const hours  = Math.floor(val / 60);
    const mins   = val % 60;
    const minIdx = Math.min(Math.round(mins / 5), 11);

    unitL.textContent = cfg.leftUnit;
    buildWheel('wheel-left',
      Array.from({length:4}, (_,i) => ({val:i, label:String(i)})),
      hours);

    sep.textContent = cfg.sep;
    rightCol.style.display = '';
    unitR.textContent = cfg.rightUnit;
    buildWheel('wheel-right',
      Array.from({length:12}, (_,i) => ({val:i*5, label:String(i*5).padStart(2,'0')})),
      minIdx);

  } else {
    unitL.textContent = cfg.leftUnit;
    const curVal = form[field] || PICKER_DEFAULTS[field] || 0;
    const idx    = cfg.vals.findIndex(v => Math.abs(v.val - curVal) < 0.01);
    buildWheel('wheel-left', cfg.vals, idx < 0 ? 0 : idx);
    sep.textContent = '';
    rightCol.style.display = 'none';
  }

  document.getElementById('picker-overlay').classList.add('open');
}

// ── Infinite-scroll wheels ──
function buildWheel(id, items, selIdx) {
  const w    = document.getElementById(id);
  const REPS = 5;
  const n    = items.length;
  const mid  = Math.floor(REPS / 2) * n;

  w.innerHTML = '';
  w.dataset.n   = n;
  w.dataset.mid = mid;

  const top = document.createElement('div');
  top.className = 'wheel-spacer';
  w.appendChild(top);

  for (let r = 0; r < REPS; r++) {
    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'wheel-item';
      el.textContent = item.label;
      el.dataset.val = item.val;
      w.appendChild(el);
    });
  }

  const bot = document.createElement('div');
  bot.className = 'wheel-spacer';
  w.appendChild(bot);

  let timer;
  let suppressUntil = 0;

  function doSnap() {
    const rawIdx    = Math.round(w.scrollTop / 46);
    const pos       = ((rawIdx % n) + n) % n;
    const targetIdx = mid + pos;

    if (rawIdx !== targetIdx) {
      // Jump to middle-rep equivalent, suppress re-entry briefly
      suppressUntil = Date.now() + 100;
      w.scrollTo({ top: targetIdx * 46, behavior: 'instant' });
      // Re-snap after jump to ensure we land on an item boundary
      setTimeout(() => {
        const snapped = Math.round(w.scrollTop / 46);
        w.scrollTo({ top: snapped * 46, behavior: 'smooth' });
      }, 30);
    } else {
      w.scrollTo({ top: rawIdx * 46, behavior: 'smooth' });
    }
  }

  w.onscroll = () => {
    if (Date.now() < suppressUntil) return;
    clearTimeout(timer);
    timer = setTimeout(doSnap, 120);
  };

  const safeIdx = Math.max(0, Math.min(selIdx || 0, n - 1));
  requestAnimationFrame(() => w.scrollTo({ top: (mid + safeIdx) * 46, behavior: 'instant' }));
}

function getWheelItemVal(id) {
  const w        = document.getElementById(id);
  const idx      = Math.round(w.scrollTop / 46);
  const allItems = w.querySelectorAll('.wheel-item');
  if (!allItems[idx]) return 0;
  return parseFloat(allItems[idx].dataset.val);
}

function closePicker(save) {
  if (save && pField) {
    const cfg = PICKER_CONFIG[pField];
    if (cfg.type === 'km') {
      const whole = getWheelItemVal('wheel-left');
      const dec   = getWheelItemVal('wheel-right');
      form[pField] = parseFloat((whole + dec / 10).toFixed(1));
    } else if (cfg.type === 'hhmm') {
      const hours = getWheelItemVal('wheel-left');
      const mins  = getWheelItemVal('wheel-right');
      form[pField] = hours * 60 + mins;
    } else {
      form[pField] = getWheelItemVal('wheel-left');
    }
    renderForm();
    saveDay();
  }
  document.getElementById('picker-overlay').classList.remove('open');
  pField = null;
}

function overlayBgClick(e) {
  if (e.target === document.getElementById('picker-overlay')) closePicker(false);
}

// ─── OVERVIEW ──────────────────────────────────────────────────
function setPeriod(p) {
  currentPeriod = p; periodOffset = 0;
  activeFilter = null;
  document.querySelectorAll('.period-tab').forEach((btn, i) =>
    btn.classList.toggle('active', ['uke','maned','ar'][i] === p));
  renderOverview();
}

function changePeriod(d) {
  periodOffset += d;
  activeFilter = null;
  renderOverview();
}

function renderOverview() {
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  const all = loadAll();
  if      (currentPeriod === 'uke')   renderWeekOverview(all);
  else if (currentPeriod === 'maned') renderMonthOverview(all);
  else                                renderYearOverview(all);
}

// ── WEEK ─────────────────────────────────────────────────────
function renderWeekOverview(all) {
  const ws = mondayOf(new Date());
  ws.setDate(ws.getDate() + periodOffset * 7);
  const dates    = Array.from({length:7}, (_, i) => { const d = new Date(ws); d.setDate(ws.getDate()+i); return d; });
  const [yr, wk] = isoWeek(dates[0]);
  document.getElementById('period-label').textContent = `Uke ${wk} · ${yr}`;

  const entries       = dates.map(d => all[dateStr(d)] || {});
  const totalKm       = entries.reduce((a,e) => a+(e.skog||0)+(e.fotball||0)/12, 0);
  const totalSessions = entries.filter(e => hasAny(e)).length;
  const avgPerWeek    = calcAvgPerWeek(all);

  renderBody({
    sessions:    totalSessions,
    sessionsSub: 'denne uka',
    kmVal:       totalKm,
    kmSub:       'km denne uka',
    avgPerWeek,
    chartTitle:  'Aktiviteter per dag',
    chartLabels: dates.map(d => DAYS_NO[(d.getDay()+6)%7]),
    datasets:    buildDatasets(all, dates),
    totals:      calcTotals(entries)
  });
}

// ── MONTH ────────────────────────────────────────────────────
function renderMonthOverview(all) {
  const base   = new Date();
  const target = new Date(base.getFullYear(), base.getMonth() + periodOffset, 1);
  const mName  = MONTHS_NO[target.getMonth()];
  const yr     = target.getFullYear();
  document.getElementById('period-label').textContent = `${mName} ${yr}`;

  const weeks    = getWeeksInMonth(target);
  const allDates = weeks.flat().filter(d => d.getMonth() === target.getMonth() && d.getFullYear() === yr);
  const entries  = allDates.map(d => all[dateStr(d)] || {});
  const totalKm  = entries.reduce((a,e) => a+(e.skog||0)+(e.fotball||0)/12, 0);
  const totalSessions = entries.filter(e => hasAny(e)).length;
  const avgPerWeek = calcAvgPerWeek(all);

  renderBody({
    sessions:    totalSessions,
    sessionsSub: 'denne måneden',
    kmVal:       totalKm,
    kmSub:       'km',
    avgPerWeek,
    chartTitle:  'Aktiviteter per uke',
    chartLabels: weeks.map(w => { const [,wk]=isoWeek(w[0]); return `Uke ${wk}`; }),
    datasets:    buildWeekDatasets(all, weeks),
    totals:      calcTotals(entries),
    calData:     { yr, mi: target.getMonth(), all }
  });
}

// ── YEAR ─────────────────────────────────────────────────────
function renderYearOverview(all) {
  const yr = new Date().getFullYear() + periodOffset;
  document.getElementById('period-label').textContent = String(yr);

  const allEntries    = Object.entries(all)
    .filter(([ds]) => ds.startsWith(yr + '-'))
    .map(([,e]) => e);
  const totalKm       = allEntries.reduce((a,e) => a+(e.skog||0)+(e.fotball||0)/12, 0);
  const totalSessions = allEntries.filter(e => hasAny(e)).length;
  const avgPerWeek    = calcAvgPerWeek(all);

  renderBody({
    sessions:    totalSessions,
    sessionsSub: 'dette året',
    kmVal:       totalKm,
    kmSub:       'km dette året',
    avgPerWeek,
    chartTitle:  'Aktiviteter per måned',
    chartLabels: MONTHS_SH,
    datasets:    buildMonthDatasets(all, yr),
    totals:      calcTotals(allEntries)
  });
}

// ── AVERAGE PER WEEK ─────────────────────────────────────────
function calcAvgPerWeek(all) {
  const dates = Object.keys(all).filter(ds => hasAny(all[ds])).sort();
  if (!dates.length) return 0;
  const firstMonday   = mondayOf(parseDate(dates[0]));
  const currentMonday = mondayOf(new Date());
  const weeksElapsed  = Math.round((currentMonday - firstMonday) / (7 * 24 * 60 * 60 * 1000)) + 1;
  return Math.round((dates.length / weeksElapsed) * 10) / 10;
}

// ── BUILD DATASETS ── styrke only if > STYRKE_OVERVIEW_THRESHOLD
function buildDatasets(all, dates) {
  return ['skog','vei','fotball','svom','langrenn','styrke'].map(k => ({
    label: ACT_NAMES[k],
    data:  dates.map(d => {
      const e = all[dateStr(d)] || {};
      if (k === 'styrke') return (e.styrke||0) >= STYRKE_OVERVIEW_THRESHOLD ? 1 : 0;
      return (e[k]||0) > 0 ? 1 : 0;
    }),
    color: ACT_COLORS[k]
  }));
}

function buildWeekDatasets(all, weeks) {
  return ['skog','vei','fotball','svom','langrenn','styrke'].map(k => ({
    label: ACT_NAMES[k],
    data:  weeks.map(wDates =>
      wDates.reduce((sum,d) => {
        const e = all[dateStr(d)] || {};
        if (k === 'styrke') return sum + ((e.styrke||0) >= STYRKE_OVERVIEW_THRESHOLD ? 1 : 0);
        return sum + ((e[k]||0) > 0 ? 1 : 0);
      }, 0)),
    color: ACT_COLORS[k]
  }));
}

function buildMonthDatasets(all, yr) {
  return ['skog','vei','fotball','svom','langrenn','styrke'].map(k => ({
    label: ACT_NAMES[k],
    data:  Array.from({length:12}, (_,mi) =>
      daysInMonth(yr,mi).reduce((sum,d) => {
        const e = all[dateStr(d)] || {};
        if (k === 'styrke') return sum + ((e.styrke||0) >= STYRKE_OVERVIEW_THRESHOLD ? 1 : 0);
        return sum + ((e[k]||0) > 0 ? 1 : 0);
      }, 0)),
    color: ACT_COLORS[k]
  }));
}

// ── CALENDAR HTML — styrke dot only if > threshold ───────────
function buildCalHtml({ yr, mi, all }) {
  const TODAY_STR = dateStr(new Date());
  const firstWd   = new Date(yr, mi, 1).getDay();
  const offset    = firstWd === 0 ? 6 : firstWd - 1;
  const daysInMo  = new Date(yr, mi + 1, 0).getDate();
  const ACTS_CAL  = ['skog','vei','fotball','svom','langrenn','styrke'];

  let cells = '';
  for (let i = 0; i < offset; i++) cells += '<div class="cal-cell empty"></div>';

  for (let day = 1; day <= daysInMo; day++) {
    const key     = `${yr}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const e       = all[key] || {};
    const isToday = key === TODAY_STR;

    const dots = ACTS_CAL
      .filter(k => {
        if (k === 'styrke') return (e.styrke||0) >= STYRKE_OVERVIEW_THRESHOLD;
        return (e[k]||0) > 0;
      })
      // If filter active, only show matching dot
      .filter(k => !activeFilter || k === activeFilter)
      .map(k => `<div class="cal-dot" style="background:${ACT_COLORS[k]}"></div>`)
      .join('');

    cells += `
      <div class="cal-cell${isToday ? ' is-today' : ''}">
        <div class="cal-num-wrap"><span class="cal-num">${day}</span></div>
        <div class="cal-dots">${dots}</div>
      </div>`;
  }

  const headers = ['M','T','O','T','F','L','S']
    .map(h => `<div class="cal-dh">${h}</div>`).join('');

  return `
    <div class="cal-card">
      <div class="cal-title">${MONTHS_NO[mi]} ${yr}</div>
      <div class="cal-grid">${headers}${cells}</div>
    </div>`;
}

function calcTotals(entries) {
  return {
    skog:     entries.reduce((a,e) => a+(e.skog||0), 0),
    vei:      entries.reduce((a,e) => a+(e.vei||0), 0),
    fotball:  entries.reduce((a,e) => a+(e.fotball||0), 0),
    svom:     entries.reduce((a,e) => a+(e.svom||0), 0),
    styrke:   entries.reduce((a,e) => a+(e.styrke||0), 0),
    langrenn: entries.reduce((a,e) => a+(e.langrenn||0), 0),
  };
}

// ── CHANGE 3 + 4: Render body with 3-col grid and filter ─────
function fmtKm(v) { return v % 1 === 0 ? String(v) : v.toFixed(1); }
function fmtVal(v, decimals) {
  if (!v || v === 0) return '—';
  return decimals ? fmtKm(v) : String(v);
}

function renderBody(params) {
  lastRenderParams = params;
  const { sessions, sessionsSub, kmVal, kmSub, avgPerWeek, chartTitle, chartLabels, datasets, totals, calData } = params;

  // Apply category filter to chart datasets
  const visibleDatasets = activeFilter
    ? datasets.filter(ds => ds.label === ACT_NAMES[activeFilter])
    : datasets;

  const filterHint = activeFilter
    ? `Filtrert: ${ACT_NAMES[activeFilter]} — klikk igjen for å nullstille`
    : '';

  const calHtml = calData ? buildCalHtml(calData) : '';

  // Breakdown cards — 6 items in 3-col grid (2 rows of 3)
  const breakdownItems = [
    { k:'skog',     val: fmtVal(totals.skog,     true),  unit:'km'  },
    { k:'vei',      val: fmtVal(totals.vei,      true),  unit:'km'  },
    { k:'fotball',  val: fmtVal(totals.fotball,  false), unit:'min' },
    { k:'svom',     val: fmtVal(totals.svom,     false), unit:'m'   },
    { k:'langrenn', val: fmtVal(totals.langrenn, true),  unit:'km'  },
    { k:'styrke',   val: fmtVal(totals.styrke,   false), unit:'enheter'},
  ];

  const breakdownHtml = breakdownItems.map(({ k, val, unit }) => `
    <div class="breakdown-card${activeFilter === k ? ' filter-on' : ''}" onclick="toggleFilter('${k}')">
      <div class="breakdown-name">${ACT_NAMES[k]}</div>
      <div class="breakdown-val">${val}${val !== '—' ? ` <span class="breakdown-unit">${unit}</span>` : ''}</div>
    </div>
  `).join('');

  const legendHtml = ['skog','vei','fotball','svom','langrenn','styrke'].map(k => `
    <div class="leg${activeFilter === k ? ' filter-on' : ''}" onclick="toggleFilter('${k}')">
      <div class="leg-dot" style="background:${ACT_COLORS[k]}"></div>
      ${ACT_NAMES[k]}
    </div>
  `).join('');

  const body = document.getElementById('overview-body');
  body.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-card-label">Treningsøkter</div>
        <div class="stat-card-val">${sessions}</div>
        <div class="stat-card-sub">${sessionsSub}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Løping + fotball</div>
        <div class="stat-card-val">${fmtVal(kmVal, true)}</div>
        <div class="stat-card-sub">${kmSub}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Gjennomsnitt</div>
        <div class="stat-card-val">${avgPerWeek}</div>
        <div class="stat-card-sub">økter per uke</div>
      </div>
    </div>

    ${calHtml}

    <div class="chart-card">
      <div class="chart-title">${chartTitle}</div>
      <div class="chart-wrap"><canvas id="main-chart"></canvas></div>
      <div class="legend">${legendHtml}</div>
      <div class="filter-hint">${filterHint}</div>
    </div>

    <div class="breakdown-section-label">Totaler for perioden</div>
    <div class="breakdown-grid">${breakdownHtml}</div>
  `;

  chartInst = new Chart(document.getElementById('main-chart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: chartLabels,
      datasets: visibleDatasets.map(ds => ({
        label: ds.label,
        data: ds.data,
        backgroundColor: ds.color + 'cc',
        borderRadius: 4,
        stack: 'acts'
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          stacked: true,
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { color: '#8a8a9a', font: { size: 9, family: 'Geist Mono' } },
          border: { color: '#e2ddd6' }
        },
        y: {
          stacked: true,
          min: 0,
          ticks: {
            stepSize: 1,
            color: '#8a8a9a',
            font: { size: 9, family: 'Geist Mono' },
            callback: v => Number.isInteger(v) && v >= 1 ? v : null
          },
          grid: { color: 'rgba(0,0,0,0.04)' },
          border: { color: '#e2ddd6' }
        }
      }
    }
  });
}

// ─── HELPERS ───────────────────────────────────────────────────
function hasAny(e) {
  if (!e) return false;
  return (e.skog||0)>0 || (e.vei||0)>0 || (e.fotball||0)>0 || (e.svom||0)>0
      || (e.styrke||0)>=STYRKE_OVERVIEW_THRESHOLD || (e.langrenn||0)>0;
}

function daysInMonth(yr, mi) {
  const result = [];
  const d = new Date(yr, mi, 1);
  while (d.getMonth() === mi) { result.push(new Date(d)); d.setDate(d.getDate()+1); }
  return result;
}

function getWeeksInMonth(monthDate) {
  const yr = monthDate.getFullYear(), mi = monthDate.getMonth();
  const weeks = [];
  let ws = mondayOf(new Date(yr, mi, 1));
  const lastDay = new Date(yr, mi+1, 0);
  while (ws <= lastDay) {
    weeks.push(Array.from({length:7}, (_,i) => {
      const dd = new Date(ws); dd.setDate(ws.getDate()+i); return dd;
    }));
    ws = new Date(ws); ws.setDate(ws.getDate()+7);
  }
  return weeks;
}

// ─── EXPORT / IMPORT ───────────────────────────────────────────
function exportData() {
  const data     = loadAll();
  const today    = dateStr(new Date());
  const filename = `trening-backup-${today}.json`;
  const blob     = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url      = URL.createObjectURL(blob);
  const a        = document.createElement('a');
  a.href         = url;
  a.download     = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Eksportert · ' + filename);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error();
      persistAll(parsed);
      renderStrip();
      loadForm();
      renderOverview();
      showToast('Importert · ' + file.name);
    } catch {
      showToast('Feil: ugyldig backup-fil');
    }
    // Reset so the same file can be re-imported if needed
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ─── INIT ──────────────────────────────────────────────────────
renderStrip();
loadForm();
